name = "Starr Pass Golf Course"
location = "Tucson Mountains, Tucson, AZ 85745"

[osm]
name_re = "Starr Pass"
search_bbox = [32.17, -111.10, 32.26, -110.99]  # s, w, n, e
nominatim_query = "Starr Pass golf, Tucson"
course_osm_id = 14067367

[holes]
count = 27
# OSM maps three unnamed nines with per-nine refs 1-9; Stage 1 chains each
# nine spatially and flattens to pipeline holes 1-27 (a=1-9, b=10-18, c=19-27,
# ordered west to east). The scorecard table below maps those pipeline hole
# numbers to the real nines — HUMAN-CONFIRMED 2026-07-20 against the renamed
# courses (Gambler/Pioneer/Palmer). Note the real nines interleave the spatial
# chains: Palmer crosses chains c and a, Gambler crosses c and a.
nines = 3

[holes.scorecard]
# nine name = [pipeline hole numbers in play order: entry i is "<Nine> #i+1"]
Palmer = [26, 27, 1, 2, 3, 4, 5, 6, 7]
Pioneer = [10, 11, 12, 13, 14, 15, 16, 17, 18]
Gambler = [19, 20, 21, 22, 23, 24, 25, 8, 9]

[lidar]
title_must_contain = ["PimaCo", "2021"]

[crs]
utm_epsg = 6341
accept_horizontal_epsg = [6341, 26912]
horizontal_desc = "EPSG:6341 NAD83(2011) / UTM zone 12N (m)"
vertical_desc = "EPSG:5703 NAVD88 height (m), GEOID18"

[qc]
notes = """this is a 27-hole facility (nines: Gambler, Pioneer, Palmer). \
Green labels use the human-confirmed scorecard mapping in course.toml \
(confirmed 2026-07-20); the underlying pipeline hole numbers 1–27 come from \
spatial chaining of OSM's unnamed nines and are recorded per green as `hole`. \
Every green carries slope flags: this is target desert golf in the Tucson \
Mountains — visual QC of the heatmaps shows genuinely tiered greens (tier \
faces legitimately exceed 8% sustained over 1 m) and OSM polygon edges that \
clip the uniformly steep (≥8%) surrounds banks, which also inflates mean \
slopes and yields scarce/zero legal pin area on ten greens. The putting cores \
and tier plateaus are clean (1–5% with coherent drainage) and the pin-zone \
maps correctly mark plateaus legal and tier faces illegal. Treat per-green \
max-sustained values at polygon edges with polygon-accuracy skepticism."""
